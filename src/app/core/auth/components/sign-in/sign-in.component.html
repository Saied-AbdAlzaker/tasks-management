<div
  class="flex items-center justify-center min-h-screen px-4 py-8 md:px-0 mt-20"
>
  <div class="md:bg-white max-w-130 p-6 md:p-10 shadow-sm">
    <h1
      class="text-2xl md:text-4xl font-bold text-[#001B48] md:mb-3 text-center"
    >
      Welcome Back
    </h1>

    <p class="text-center text-slate-500 md:mb-5">
      Please enter your details to access your workspace
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
      <!-- Email -->

      <div>
        <label class="label"> EMAIL </label>

        <input
          class="input"
          type="email"
          formControlName="email"
          placeholder="yourname@company.com"
        />

        @if (form.controls.email.touched && form.controls.email.invalid) {
          <p class="error">Invalid email address.</p>
        }
      </div>

      <!-- Password Row -->

      <div>
        <label class="label"> PASSWORD </label>

        <div class="relative">
          <input
            [type]="hidePassword ? 'password' : 'text'"
            class="input pr-12"
            formControlName="password"
            placeholder="Password"
          />

          <button
            type="button"
            class="absolute right-4 top-1/2 -translate-y-1/2"
            (click)="hidePassword = !hidePassword"
          >
            @if (hidePassword) {
              <img
                src="../../../../../assets/images/eye-slash.svg"
                alt="Hide Password"
              />
            } @else {
              <img
                src="../../../../../assets/images/eye.svg"
                class="mt-2"
                alt="Show Password"
              />
            }
          </button>
        </div>
      </div>

      <!-- Forgot Password -->
      <div class="flex justify-between items-center">
        <div class="flex items-center">
          <input type="checkbox" id="remember-me" class="cursor-pointer" />
          <p class="text-slate-500 ml-2">Remember Me</p>
        </div>
        <a
          routerLink="/forgot-password"
          class="text-blue-700 font-semibold ml-2"
        >
          Forgot Password?
        </a>
      </div>

      @if (serverError) {
        <p class="text-red-500 text-sm text-center">{{ serverError }}</p>
      }

      <button
        type="submit"
        class="w-full bg-[#003D9B] hover:bg-blue-800 text-white py-4 rounded-xl font-semibold"
      >
        {{loading ? 'Logging In...' : 'Log In'}}
      </button>
    </form>

    <p class="text-center text-slate-500 mt-25 md:mt-10">
      Don’t have an account?

      <a routerLink="/sign-up" class="text-blue-700 font-semibold ml-2">
        Sign up
      </a>
    </p>
  </div>
</div>
