<div
  class="flex items-center justify-center min-h-screen px-4 py-8 md:px-0"
>
  <div class="md:bg-white max-w-130 p-6 md:p-10 shadow-sm">
    @if (title || subtitle) {
      <div class="mb-5 border-b border-slate-100 pb-4">
        @if (title) {
          <h2 class="text-2xl md:text-4xl font-bold text-[#001B48] md:mb-3 text-center">
            {{ title }}
          </h2>
        }

        @if (subtitle) {
          <p class="text-center text-slate-500">
            {{ subtitle }}
          </p>
        }
      </div>
    }

    <ng-content></ng-content>
  </div>
</div>
