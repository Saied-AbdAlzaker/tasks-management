<button
  [type]="type"
  [disabled]="disabled || loading"
  [class]="classes">

  @if (loading) {

    <svg
      class="mr-2 h-4 w-4 animate-spin"
      fill="none"
      viewBox="0 0 24 24">

      <circle
        class="opacity-25"
        cx="12"
        cy="12"
        r="10"
        stroke="currentColor"
        stroke-width="4">
      </circle>

      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8v4l3-3-3-3v4A10 10 0 002 12h2z">
      </path>

    </svg>

  }

  <ng-content></ng-content>

</button>
