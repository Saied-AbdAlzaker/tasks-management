<div class="rounded-2xl border border-indigo-100 bg-indigo-50 p-5">
  <h3 class="mb-4 text-sm font-semibold text-slate-700">
    {{ title }}
  </h3>

  <div class="space-y-3">
    @for (item of requirements; track item.label) {
      <div class="flex items-center gap-3">
        <img
          [src]="
            item.completed
              ? 'assets/images/checkboxChecked.svg'
              : 'assets/images/checkbox.svg'
          "
          [alt]="item.completed ? 'checked' : 'unchecked'"
        />

        <span
          class="text-sm"
          [ngClass]="
            item.completed ? 'font-medium text-green-600' : 'text-slate-500'
          "
        >
          {{ item.label }}
        </span>
      </div>
    }
  </div>
</div>
